<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>LAYK — Google Meet Background (pattern)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background: #000;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Padrão de chevrons (linkedin-cover-pattern) com fade L->R */
    .pattern {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
    }

    /* Vignette — escurece bordas e o centro-baixo onde a pessoa aparece */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 120% 110% at 42% 55%, rgba(0,0,0,0.55) 18%, transparent 60%),
                  radial-gradient(ellipse 150% 100% at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%);
    }

    /* Hairlines topo/rodapé */
    .line-top { position: absolute; top: 0; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.10); }
    .line-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.06); }

    /* Logo — canto SUPERIOR DIREITO */
    .logo-area {
      position: absolute;
      top: 60px;
      right: 72px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 12px; line-height: 1; }
    .logo-chevron { font-weight: 900; font-size: 62px; color: #00E5A0; line-height: 1; letter-spacing: -0.02em; }
    .logo-wordmark { font-weight: 700; font-size: 62px; color: #FFFFFF; letter-spacing: 9px; line-height: 1; }
    .hairline-logo { width: 56px; height: 1px; background: rgba(255,255,255,0.20); }
    .tagline {
      font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 15px;
      color: rgba(255,255,255,0.42); letter-spacing: 0.26em; text-transform: uppercase;
    }

    /* URL — canto inferior esquerdo (balanço diagonal com o logo) */
    .url {
      position: absolute; bottom: 50px; left: 72px;
      font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 14px;
      color: rgba(255,255,255,0.22); letter-spacing: 0.14em;
    }
  </style>
</head>
<body>
  <svg class="pattern" viewBox="0 0 1920 1080" width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="chev" width="66" height="57" patternUnits="userSpaceOnUse" patternTransform="translate(0,6)">
        <g transform="translate(20,15) scale(1.08)" fill="rgba(255,255,255,0.10)">
          <path d="M22 3 L4 16 L22 29 L27 24 L14 16 L27 8 Z"/>
        </g>
      </pattern>
      <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#FFFFFF"/>
        <stop offset="0.06" stop-color="#FFFFFF"/>
        <stop offset="0.72" stop-color="#000000"/>
      </linearGradient>
      <mask id="fadeMask"><rect width="1920" height="1080" fill="url(#fade)"/></mask>
    </defs>
    <rect width="1920" height="1080" fill="#000000"/>
    <rect width="1920" height="1080" fill="url(#chev)" mask="url(#fadeMask)"/>
  </svg>

  <div class="vignette"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <div class="logo-area">
    <div class="logo">
      <span class="logo-chevron">&lt;</span>
      <span class="logo-wordmark">LAYK</span>
    </div>
    <div class="hairline-logo"></div>
    <div class="tagline">AI WITH STRATEGY.</div>
  </div>

  <div class="url">layk.com.br</div>
</body>
</html>
