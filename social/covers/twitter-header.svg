<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="cursor-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="#060a14"/>
  <!-- Code decorativo à esquerda -->
  <g opacity="0.06" font-family="'Space Grotesk', monospace" font-size="15" fill="white">
    <text x="80" y="80">const layk = require('@layk/core');</text>
    <text x="80" y="110">const ai = layk.init({ model: 'latest' });</text>
    <text x="80" y="140">await ai.build({ target: 'production' });</text>
    <text x="80" y="170">// → shipping</text>
    <text x="80" y="220">const hub = layk.connect('hub');</text>
    <text x="80" y="250">hub.deploy({ scale: 'auto' });</text>
    <text x="80" y="280">hub.monitor({ uptime: '99.99%' });</text>
    <text x="80" y="310">// → live</text>
    <text x="80" y="360">const agent = layk.agent('whatsapp');</text>
    <text x="80" y="390">agent.listen({ channel: 'all' });</text>
    <text x="80" y="440">process.exit(0); // done</text>
  </g>
  <!-- Linha vertical separadora -->
  <line x1="820" y1="60" x2="820" y2="440" stroke="url(#cursor-gradient)" stroke-width="1" opacity="0.2"/>
  <!-- Logo à direita -->
  <text x="920" y="262" font-family="'Space Grotesk', sans-serif" font-size="56" font-weight="300" fill="#2DD4BF">›</text>
  <text x="960" y="264" font-family="'Space Grotesk', sans-serif" font-size="66" font-weight="700" fill="white" letter-spacing="12">LAYK</text>
  <rect x="960" y="282" width="244" height="2" rx="1" fill="url(#cursor-gradient)" opacity="0.3"/>
  <!-- Tagline -->
  <text x="1082" y="322" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="15" fill="#3a4f6f" letter-spacing="5">AI-NATIVE SOFTWARE HOUSE</text>
</svg>
