<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <pattern id="chev" width="44" height="38" patternUnits="userSpaceOnUse" patternTransform="translate(0,4)">
      <g transform="translate(13,10) scale(0.74)" fill="rgba(255,255,255,0.1)">
        <path d="M22 3 L4 16 L22 29 L27 24 L14 16 L27 8 Z"/>
      </g>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.08" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <mask id="fadeMask"><rect width="1128" height="191" fill="url(#fade)"/></mask>
  </defs>

  <rect width="1128" height="191" fill="#000000"/>
  <!-- padrão de chevrons com fade L->R -->
  <rect width="1128" height="191" fill="url(#chev)" mask="url(#fadeMask)"/>

  <!-- lockup canônico pequeno, canto inferior direito -->
