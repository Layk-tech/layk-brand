  <rect x="1046" y="140" width="34" height="2" fill="#FFFFFF" opacity="0.30"/>
  <text x="1080" y="160" text-anchor="end" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="10" letter-spacing="3.2" fill="#FFFFFF" fill-opacity="0.45">AI WITH STRATEGY.</text>
</svg>