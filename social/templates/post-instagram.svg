<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="cursor-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg-gradient)"/>
  <!-- Grid sutil -->
  <g opacity="0.025">
    <line x1="360" y1="0" x2="360" y2="1080" stroke="white" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1080" y2="360" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="1080" y2="720" stroke="white" stroke-width="0.5"/>
  </g>
  <!-- Área de conteúdo (placeholder) -->
  <text x="100" y="200" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#2a3a5a" letter-spacing="4">TÍTULO DA POSTAGEM</text>
  <text x="100" y="340" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="2">Conteúdo</text>
  <text x="100" y="420" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="2">principal</text>
  <text x="100" y="500" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="300" fill="#2DD4BF" letter-spacing="2">aqui.</text>
  <!-- Rodapé com logo -->
  <rect x="0" y="920" width="1080" height="1" fill="url(#cursor-gradient)" opacity="0.1"/>
  <text x="100" y="1000" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="300" fill="#2DD4BF">›</text>
  <text x="126" y="1000" font-family="'Space Grotesk', sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="8">LAYK</text>
  <rect x="126" y="1010" width="138" height="1.5" rx="0.75" fill="url(#cursor-gradient)" opacity="0.25"/>
  <!-- Tagline no canto -->
  <text x="980" y="1000" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#3a4f6f" letter-spacing="3">layk.os</text>
</svg>
