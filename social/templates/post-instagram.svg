    <line x1="360" y1="0" x2="360" y2="1080" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1080" y2="360" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="1080" y2="720" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
  <!-- Kicker (placeholder) -->
  <text x="100" y="230" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="500" fill="#FFFFFF" fill-opacity="0.45" letter-spacing="6">TEMA DO POST</text>
  <!-- Headline (placeholder) — Inter 400 + Playfair italic no destaque -->
  <text x="98" y="380" font-family="Inter, sans-serif" font-size="92" font-weight="400" fill="#FFFFFF" letter-spacing="-2">Conteúdo</text>
  <text x="98" y="488" font-family="'Playfair Display', serif" font-size="92" font-weight="500" font-style="italic" fill="#FFFFFF" letter-spacing="-1">principal.</text>
  <!-- Rodapé -->
  <rect x="100" y="930" width="880" height="1" fill="#FFFFFF" opacity="0.12"/>
  <text x="100" y="1000" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#00E5A0" letter-spacing="-1">&lt;</text>
  <text x="148" y="1000" font-family="Inter, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="8">LAYK</text>
  <text x="980" y="1000" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="500" fill="#FFFFFF" fill-opacity="0.45" letter-spacing="3">AI THAT ADAPTS.</text>
