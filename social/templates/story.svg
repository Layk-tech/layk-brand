<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="cursor-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg-gradient)"/>
  <!-- Logo no topo -->
  <text x="80" y="140" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="300" fill="#2DD4BF">›</text>
  <text x="102" y="140" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="6">LAYK</text>
  <rect x="102" y="150" width="120" height="1.2" rx="0.6" fill="url(#cursor-gradient)" opacity="0.25"/>
  <!-- Área de conteúdo central -->
  <text x="80" y="820" font-family="'Space Grotesk', sans-serif" font-size="14" fill="#2a3a5a" letter-spacing="4">TÍTULO</text>
  <text x="80" y="920" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" fill="white">Conteúdo</text>
  <text x="80" y="1010" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" fill="white">principal</text>
  <text x="80" y="1100" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="300" fill="#2DD4BF">aqui.</text>
  <!-- Rodapé -->
  <text x="540" y="1820" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" fill="#3a4f6f" letter-spacing="4">AI-NATIVE SOFTWARE HOUSE</text>
</svg>
